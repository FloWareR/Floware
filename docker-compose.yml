services:
  db:
    image: mysql:8.0
    container_name: floware-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-testpass}
      MYSQL_DATABASE: ${DB_DATABASE:-floware_db}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: .
    container_name: floware-api
    restart: always
    ports:
      - "8000:80"
    environment:
      - DB_HOST=db
      - PROD=true
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  client:
    build:
      context: ./client
    container_name: floware-client
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  mysql_data:

